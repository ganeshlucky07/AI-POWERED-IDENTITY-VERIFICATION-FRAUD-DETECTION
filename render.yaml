services:
  - type: web
    name: kyc-identity-verification
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KYC_DB_PATH
        value: /tmp/kyc.db
